<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal | Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile_unified.css">
    <style>
        .tabular-data { font-variant-numeric: tabular-nums; }
        .order-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 2.5rem; padding: 2.5rem; }
        .input-group label { display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #64748b; margin-bottom: 0.8rem; }
        .input-field { width: 100%; background: #020617; border: 1px solid #1e293b; border-radius: 1.2rem; padding: 1.2rem 1.5rem; color: white; font-weight: 700; transition: all 0.3s; }
        .input-field:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .broker-chip { padding: 0.6rem 1.5rem; border-radius: 1rem; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid #1e293b; color: #64748b; transition: all 0.3s; white-space: nowrap; cursor: pointer; }
        .broker-chip.active { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3); }
        
        #autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #0f172a; border: 1px solid #1e293b; border-radius: 1.2rem; z-index: 100; max-height: 250px; overflow-y: auto; margin-top: 5px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .suggestion-item { padding: 1rem 1.5rem; cursor: pointer; border-bottom: 1px solid #1e293b; transition: background 0.2s; }
        .suggestion-item:hover { background: #1e293b; }

        .ai-intel-panel { background: linear-gradient(180deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.7) 100%); border: 1px solid rgba(59, 130, 246, 0.15); }
        
        /* Sidebar Visibility Fix - Now handled by CSS */
        .main-container { flex-grow: 1; overflow-y: auto; }
        .desktop-view { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
    </style>
</head>
<body class="force-auto">
    <!-- Author: Vishal Joshi (vishaljoshi9694@gmail.com) -->
    
    <!-- DESKTOP -->
    <div class="desktop-view">
        <aside class="sidebar flex flex-col p-4" id="desktop-sidebar"></aside>

        <main class="main-container custom-scrollbar bg-[#020617]">
            <header class="p-8 flex justify-between items-center glass sticky top-0 z-50">
                <div class="flex items-center gap-8">
                    <h2 class="text-2xl font-black uppercase tracking-tighter text-white">Execution Terminal</h2>
                    <div id="d-broker-selector" class="flex gap-2"></div>
                </div>
                <div class="flex gap-6 items-center">
                    <div class="text-right">
                        <p id="d-margin" class="text-xl font-black font-mono text-blue-400 tabular-data">₹0.00</p>
                        <p class="text-[8px] text-slate-500 uppercase font-black tracking-widest">Available Margin</p>
                    </div>
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-black shadow-lg text-white" id="d-user-init">U</div>
                </div>
            </header>
            
            <div class="p-8 grid grid-cols-12 gap-8 h-[calc(100vh-120px)] overflow-hidden">
                <!-- Order Panel -->
                <div class="col-span-7 space-y-6 overflow-y-auto custom-scrollbar pr-4">
                    <div class="order-card space-y-10 border border-white/5 shadow-2xl bg-slate-900/40">
                        <div class="flex justify-between items-center pb-6 border-b border-white/5">
                            <div class="flex flex-col">
                                <h3 class="font-black text-white text-lg uppercase tracking-tight">Standard Routing Node</h3>
                                <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">MIS / Intraday Enabled</p>
                            </div>
                            <div class="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-800 shadow-inner">
                                <button onclick="window.setSide('BUY')" id="d-buy" class="px-10 py-3 rounded-xl font-black text-xs transition-all duration-300 bg-green-600 text-white shadow-lg">BUY</button>
                                <button onclick="window.setSide('SELL')" id="d-sell" class="px-10 py-3 rounded-xl font-black text-xs transition-all duration-300 text-slate-500 hover:text-white ml-1">SELL</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-8">
                            <div class="input-group relative">
                                <label>Asset Symbol</label>
                                <input type="text" id="symbol-input" class="input-field text-xl uppercase tracking-tighter" placeholder="SEARCH SYMBOL..." autocomplete="off">
                                <div id="autocomplete-list"></div>
                            </div>
                            <div class="input-group">
                                <label>Execution Quantity</label>
                                <input type="number" id="qty-input" class="input-field text-xl tabular-data" value="1" min="1">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-8">
                            <div class="input-group">
                                <label>Order Protocol</label>
                                <select id="order-type" onchange="window.handleOrderType(this.value)" class="input-field bg-slate-950 font-black text-[10px] uppercase tracking-widest">
                                    <option value="MARKET">Market (Instant Entry)</option>
                                    <option value="LIMIT">Limit (Price Protection)</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Protocol Price</label>
                                <input type="number" id="price-input" class="input-field text-xl tabular-data" placeholder="LTP Focus">
                            </div>
                        </div>

                        <button onclick="window.placeTrade()" class="w-full py-6 bg-blue-600 hover:bg-blue-500 rounded-[2.2rem] font-black text-xl shadow-2xl shadow-blue-900/40 transition-all active:scale-[0.98] uppercase tracking-tighter group text-white">
                            Authorize Submission <i class="fas fa-paper-plane ml-2 text-sm opacity-30 group-hover:opacity-100 transition-opacity"></i>
                        </button>
                    </div>

                    <!-- Charges Breakup -->
                    <div class="order-card p-8 border border-white/5 bg-slate-900/40">
                        <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Financial Reconciliation</h4>
                        <div class="grid grid-cols-3 gap-8">
                            <div class="space-y-1"><p class="text-[8px] text-slate-600 uppercase font-black">Gross Value</p><p id="breakup-value" class="font-mono font-black text-white">₹0.00</p></div>
                            <div class="space-y-1"><p class="text-[8px] text-slate-600 uppercase font-black">Node Levies</p><p id="breakup-charges" class="font-mono font-black text-red-400">₹0.00</p></div>
                            <div class="space-y-1"><p class="text-[8px] text-slate-600 uppercase font-black">Net Margin Impact</p><p id="breakup-net" class="font-mono font-black text-blue-400">₹0.00</p></div>
                        </div>
                    </div>
                </div>

                <!-- AI Sidebar -->
                <div class="col-span-5 ai-intel-panel rounded-[3rem] p-10 flex flex-col shadow-2xl border border-blue-500/10 bg-blue-900/5">
                    <div class="flex items-center gap-3 mb-10">
                        <i class="fas fa-atom fa-spin-slow text-blue-400"></i>
                        <h4 class="text-[10px] font-black text-blue-400 uppercase tracking-[0.4em]">Neural Tactical Advisor</h4>
                    </div>
                    <div id="ai-advisor-content" class="flex-grow overflow-y-auto custom-scrollbar">
                        <div class="py-20 text-center opacity-30 flex flex-col items-center">
                            <i class="fas fa-satellite-dish text-5xl mb-6 text-slate-400"></i>
                            <p class="text-[10px] uppercase font-black tracking-widest text-slate-400">Awaiting active node selection...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MOBILE -->
    <div class="mobile-view">
        <header class="p-6 flex justify-between items-center glass sticky top-0 z-[1000]">
            <h2 class="text-xl font-black tracking-tighter uppercase text-white">TERMINAL</h2>
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center font-black shadow-lg text-white" id="m-user-init">U</div>
        </header>

        <main class="p-4 space-y-6 pb-24 bg-[#020617] min-h-screen">
            <div id="m-broker-selector" class="flex gap-2 overflow-x-auto no-scrollbar py-1"></div>

            <div class="order-card p-8 border border-white/5 space-y-8 shadow-2xl bg-slate-900/40 rounded-3xl">
                <div class="flex justify-between items-center pb-6 border-b border-white/5">
                    <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Uplink Mode</h3>
                    <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800">
                        <button onclick="window.setSide('BUY')" id="m-buy" class="px-8 py-2.5 rounded-lg font-black text-[10px] bg-green-600 text-white shadow-lg transition-all duration-300">BUY</button>
                        <button onclick="window.setSide('SELL')" id="m-sell" class="px-8 py-2.5 rounded-lg font-black text-[10px] text-slate-500 transition-all duration-300 ml-1">SELL</button>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="input-group"><label>Asset Node</label><input type="text" id="m-symbol" class="input-field uppercase text-lg font-black" placeholder="SYMBOL" oninput="window.triggerAI(this.value)"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group"><label>Units</label><input type="number" id="m-qty" value="1" class="input-field text-lg font-black tabular-data"></div>
                        <div class="input-group"><label>Price</label><input type="number" id="m-price" class="input-field text-lg font-black tabular-data" placeholder="LTP"></div>
                    </div>
                    <button onclick="window.placeTrade()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition-all uppercase tracking-tighter text-white">Authorize Node Link</button>
                </div>
            </div>

            <div id="m-ai-advisor" class="hidden order-card bg-blue-950/20 border-blue-500/20 p-8 shadow-inner rounded-3xl"></div>
        </main>

        <nav class="mobile-nav" id="mobile-bottom-nav"></nav>
    </div>

    <script type="module">
        /** Author: Vishal Joshi (vishaljoshi9694@gmail.com) **/
        import { initNavigation } from "./js/nav_manager.js";
        import { checkAuth, getAuthHeaders } from "./js/auth.js";
        import { getBrokers, getAISingleStock, getAllBalances } from "./js/api.js";

        // --- Core Init ---
        initNavigation();
        const user = checkAuth();
        const initLetter = user.username[0].toUpperCase();
        if(document.getElementById('d-user-init')) document.getElementById('d-user-init').innerText = initLetter;
        if(document.getElementById('m-user-init')) document.getElementById('m-user-init').innerText = initLetter;

        let brokers = [];
        let selectedBrokerId = null;
        let currentSide = 'BUY';
        let currentLTP = 0;

        const SUGGESTED_STOCKS = ["NIFTY 50", "BANKNIFTY", "FINNIFTY", "RELIANCE", "HDFCBANK", "ICICIBANK", "INFY", "TCS", "ITC", "SBIN", "BHARTIARTL", "AXISBANK", "KOTAKBANK", "LT", "BAJFINANCE", "M&M", "MARUTI", "SUNPHARMA", "TITAN", "ASIANPAINT", "ADANIENT"];

        async function init() {
            try {
                brokers = await getBrokers();
                renderBrokerSelectors();
                const bal = await getAllBalances();
                const marginEl = document.getElementById('d-margin');
                if(marginEl) marginEl.innerText = `₹${parseFloat(bal.total_balance || 0).toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
            } catch(e) { console.error("Terminal Init Error:", e); }
        }

        function renderBrokerSelectors() {
            const html = brokers.map(b => `
                <button onclick="window.selectBroker(${b.id})" id="br-${b.id}" class="broker-chip ${selectedBrokerId === b.id ? 'active' : 'bg-slate-950/50'}">${b.broker_name}</button>
            `).join('');
            const dSel = document.getElementById('d-broker-selector'); if(dSel) dSel.innerHTML = html;
            const mSel = document.getElementById('m-broker-selector'); if(mSel) mSel.innerHTML = html;
            if(brokers.length > 0 && !selectedBrokerId) window.selectBroker(brokers[0].id);
        }

        window.selectBroker = (id) => { selectedBrokerId = id; renderBrokerSelectors(); };

        window.setSide = (side) => {
            currentSide = side;
            ['d', 'm'].forEach(p => {
                const b = document.getElementById(p+'-buy'); const s = document.getElementById(p+'-sell');
                if(!b || !s) return;
                b.className = side === 'BUY' ? 'px-10 py-3 rounded-xl font-black text-xs bg-green-600 text-white shadow-lg' : 'px-10 py-3 rounded-xl font-black text-xs text-slate-500';
                s.className = side === 'SELL' ? 'px-10 py-3 rounded-xl font-black text-xs bg-red-600 text-white shadow-lg ml-1' : 'px-10 py-3 rounded-xl font-black text-xs text-slate-500 ml-1';
            });
        };

        const symInput = document.getElementById('symbol-input');
        const autoList = document.getElementById('autocomplete-list');

        if(symInput) {
            symInput.oninput = (e) => {
                const val = e.target.value.toUpperCase();
                if(!val) { autoList.innerHTML = ''; return; }
                const filtered = SUGGESTED_STOCKS.filter(s => s.startsWith(val));
                autoList.innerHTML = filtered.map(s => `<div class="suggestion-item font-black text-white" onclick="window.selectSymbol('${s}')">${s}</div>`).join('');
                if(val.length >= 4) window.triggerAI(val);
            };
        }

        window.selectSymbol = (sym) => { 
            if(symInput) symInput.value = sym;
            if(autoList) autoList.innerHTML = ''; 
            window.triggerAI(sym); 
        };

        window.triggerAI = async (sym) => {
            if(!sym || sym.length < 2) return;
            const containerD = document.getElementById('ai-advisor-content');
            const containerM = document.getElementById('m-ai-advisor');
            if(containerM) containerM.classList.remove('hidden');

            const loader = '<div class="py-20 text-center flex flex-col items-center"><i class="fas fa-atom fa-spin text-blue-500 text-3xl mb-4"></i><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Calibrating Intelligence...</p></div>';
            if(containerD) containerD.innerHTML = loader;
            if(containerM) containerM.innerHTML = loader;

            try {
                const ai = await getAISingleStock(sym);
                currentLTP = ai.ltp || (Math.random() * 500 + 1000);
                
                const html = `
                    <div class="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <div class="flex justify-between items-center pb-8 border-b border-white/5">
                            <div><h4 class="text-4xl font-black tracking-tighter text-white">${sym}</h4><p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mt-2">CMP: ₹${currentLTP.toFixed(2)}</p></div>
                            <span class="px-5 py-2 rounded-xl text-[10px] font-black uppercase ${ai.recommendation === 'BUY' ? 'bg-green-600/20 text-green-400' : 'bg-red-600/20 text-red-400'} border border-white/5">${ai.recommendation} SIGNAL</span>
                        </div>
                        <div class="p-8 bg-slate-950/80 rounded-[2rem] border border-white/5 shadow-inner">
                            <p class="text-[14px] text-slate-300 leading-relaxed italic font-medium">"${ai.market_narrative || ai.analysis}"</p>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="bg-slate-900 p-5 rounded-3xl border border-white/5 text-center"><p class="text-[7px] text-slate-500 font-black uppercase mb-1">Target 1</p><p class="text-green-400 font-black text-lg">₹${ai.target_1.toFixed(1)}</p></div>
                            <div class="bg-slate-900 p-5 rounded-3xl border border-white/5 text-center"><p class="text-[7px] text-slate-500 font-black uppercase mb-1">Target 2</p><p class="text-green-400 font-black text-lg">₹${ai.target_2.toFixed(1)}</p></div>
                            <div class="bg-slate-900 p-5 rounded-3xl border border-white/5 text-center"><p class="text-[7px] text-slate-500 font-black uppercase mb-1">Hard SL</p><p class="text-red-400 font-black text-lg">₹${ai.stop_loss.toFixed(1)}</p></div>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div class="p-6 bg-green-500/5 border border-green-500/10 rounded-[1.5rem]"><p class="text-[8px] text-green-500 font-black uppercase mb-3">Alpha Proxies</p><p class="text-[10px] text-slate-400 font-bold leading-relaxed">• ${ai.pros[0]}<br>• ${ai.pros[1]}</p></div>
                            <div class="p-6 bg-red-500/5 border border-red-500/10 rounded-[1.5rem]"><p class="text-[8px] text-red-500 font-black uppercase mb-3">System Risks</p><p class="text-[11px] text-slate-400 font-bold leading-relaxed">• ${ai.cons[0]}<br>• ${ai.cons[1]}</p></div>
                        </div>
                    </div>
                `;
                if(containerD) containerD.innerHTML = html;
                if(containerM) containerM.innerHTML = html;

                const priceInput = document.getElementById('price-input'); if(priceInput) priceInput.value = currentLTP.toFixed(2);
                const mPriceInput = document.getElementById('m-price'); if(mPriceInput) mPriceInput.value = currentLTP.toFixed(2);
                window.updateBreakup();
            } catch(e) { if(containerD) containerD.innerHTML = '<p class="text-center py-20 text-[10px] font-black uppercase text-slate-600 tracking-[0.3em]">Neural Interface Offline</p>'; }
        };

        window.handleOrderType = (type) => {
            const input = document.getElementById('price-input');
            if(!input) return;
            if(type === 'MARKET') { input.value = currentLTP.toFixed(2); input.disabled = true; input.classList.add('opacity-40'); }
            else { input.disabled = false; input.classList.remove('opacity-40'); }
            window.updateBreakup();
        };

        window.updateBreakup = () => {
            const qtyInput = document.getElementById('qty-input'); const mQty = document.getElementById('m-qty');
            const priceInput = document.getElementById('price-input'); const mPrice = document.getElementById('m-price');
            
            const qty = parseInt((qtyInput?qtyInput.value:0) || (mQty?mQty.value:0) || 1);
            const price = parseFloat((priceInput?priceInput.value:0) || (mPrice?mPrice.value:0) || currentLTP);
            const val = qty * price;
            const charges = (val * 0.0003) + 20;
            const vEl = document.getElementById('breakup-value'); if(vEl) vEl.innerText = `₹${val.toLocaleString('en-IN')}`;
            const cEl = document.getElementById('breakup-charges'); if(cEl) cEl.innerText = `₹${charges.toFixed(2)}`;
            const nEl = document.getElementById('breakup-net'); if(nEl) nEl.innerText = `₹${(val + charges).toLocaleString('en-IN')}`;
        };

        ['qty-input', 'price-input', 'm-qty', 'm-price'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.oninput = window.updateBreakup;
        });

        window.placeTrade = async () => {
            if(!selectedBrokerId) { alert('DENIED: Initialize Broker Linkage First'); return; }
            const symbol = (document.getElementById('symbol-input')?.value) || (document.getElementById('m-symbol')?.value);
            const qty = parseInt((document.getElementById('qty-input')?.value) || (document.getElementById('m-qty')?.value));
            const price = parseFloat((document.getElementById('price-input')?.value) || (document.getElementById('m-price')?.value));
            const type = document.getElementById('order-type')?.value || 'MARKET';

            try {
                const res = await fetch('/api/trades/place', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ broker_id: selectedBrokerId, symbol, quantity: qty, side: currentSide, order_type: type, price })
                });
                if(res.ok) alert('PROTOCOL AUTHORIZED: Order Submitted');
                else alert('ERROR: ' + (await res.json()).detail);
            } catch(e) { alert('Protocol Link Failure'); }
        };

        // --- Export Globals ---
        window.selectBroker = window.selectBroker;
        window.setSide = window.setSide;
        window.triggerAI = window.triggerAI;
        window.selectSymbol = window.selectSymbol;
        window.handleOrderType = window.handleOrderType;
        window.placeTrade = window.placeTrade;
        window.updateBreakup = window.updateBreakup;

        init();
    </script>
</body>
</html>
