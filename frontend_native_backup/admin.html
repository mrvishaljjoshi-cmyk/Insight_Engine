<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Console | Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile_unified.css">
    <style>
        .tabular-data { font-variant-numeric: tabular-nums; }
        .admin-sidebar { 
            width: 280px; 
            border-right: 1px solid rgba(99, 102, 241, 0.2); 
            height: 100vh;
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
        }
        .btn-active-admin { 
            background: rgba(99, 102, 241, 0.15); 
            color: #818cf8; 
            border-right: 4px solid #6366f1; 
        }
        .admin-stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 2rem;
            padding: 2rem;
        }
    </style>
</head>
<body class="force-auto">
    <!-- DESKTOP VIEW -->
    <div class="desktop-view">
        <aside class="admin-sidebar flex flex-col p-8 shrink-0">
            <div class="flex items-center gap-4 mb-12 px-2">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-user-shield text-white"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tighter text-white">CORE ADMIN</span>
                    <span class="text-[8px] font-black text-indigo-400 uppercase tracking-[0.3em]">Insight Engine 3.0</span>
                </div>
            </div>

            <nav class="flex-grow space-y-3">
                <button onclick="showSection('users')" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-left transition-all section-btn" data-section="users">
                    <i class="fas fa-users w-5"></i> User Base
                </button>
                <button onclick="showSection('approvals')" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-left transition-all text-slate-500 hover:bg-slate-900 section-btn" data-section="approvals">
                    <i class="fas fa-clipboard-check w-5"></i> Verification
                </button>
                <button onclick="showSection('plans')" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-left transition-all text-slate-500 hover:bg-slate-900 section-btn" data-section="plans">
                    <i class="fas fa-tags w-5"></i> Plan Matrix
                </button>
                <button onclick="showSection('brokers')" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-left transition-all text-slate-500 hover:bg-slate-900 section-btn" data-section="brokers">
                    <i class="fas fa-network-wired w-5"></i> Node Audit
                </button>
            </nav>

            <div class="mt-auto pt-8 border-t border-slate-800/50">
                <button onclick="location.href='dashboard.html'" class="w-full flex items-center gap-4 px-6 py-4 text-slate-500 hover:text-white transition-colors font-black text-[10px] uppercase tracking-widest">
                    <i class="fas fa-arrow-left w-5"></i> Exit Console
                </button>
            </div>
        </aside>

        <div class="flex-grow flex flex-col overflow-hidden">
            <header class="p-8 flex justify-between items-center glass sticky top-0 z-50">
                <h2 id="section-title" class="text-3xl font-black uppercase tracking-tighter">System Overview</h2>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p id="admin-name-d" class="font-black text-sm text-white">--</p>
                        <p class="text-[9px] text-indigo-400 uppercase font-black tracking-widest">Root Authority</p>
                    </div>
                    <button onclick="handleLogout()" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center border border-slate-800 hover:bg-red-600/20 hover:text-red-500 transition-all shadow-xl">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </header>

            <main class="flex-grow overflow-y-auto custom-scrollbar p-8">
                <div id="section-users" class="section-content space-y-8">
                    <div class="grid grid-cols-3 gap-8">
                        <div class="admin-stat-card border-indigo-500/20">
                            <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.2em] mb-4">Total Identities</p>
                            <h3 id="stat-users" class="text-5xl font-black tabular-data">--</h3>
                        </div>
                        <div class="admin-stat-card border-slate-800">
                            <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.2em] mb-4">Active Tiers</p>
                            <h3 id="stat-subs" class="text-5xl font-black tabular-data">--</h3>
                        </div>
                        <div class="admin-stat-card border-slate-800">
                            <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.2em] mb-4">Broker Uplinks</p>
                            <h3 id="stat-brokers" class="text-5xl font-black tabular-data">--</h3>
                        </div>
                    </div>

                    <div class="glass rounded-[3rem] overflow-hidden border border-white/5 shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-slate-900/50 text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-white/5">
                                <tr>
                                    <th class="px-10 py-6">Identity</th>
                                    <th class="px-6 py-6 text-center">Protocol Tier</th>
                                    <th class="px-6 py-6 text-center">Uplinks</th>
                                    <th class="px-6 py-6">Access Status</th>
                                    <th class="px-10 py-6 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>

                <div id="section-approvals" class="section-content hidden space-y-8">
                    <div class="glass rounded-[3rem] overflow-hidden border border-white/5 shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-slate-900/50 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                <tr>
                                    <th class="px-10 py-6">Subject</th>
                                    <th class="px-6 py-6">Proposed Metadata</th>
                                    <th class="px-10 py-6 text-right">Authority Action</th>
                                </tr>
                            </thead>
                            <tbody id="approvals-table-body" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
                <!-- Other sections... -->
            </main>
        </div>
    </div>

    <!-- MOBILE VIEW -->
    <div class="mobile-view">
        <header class="p-6 flex justify-between items-center glass sticky top-0 z-[1000]">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg"><i class="fas fa-user-shield text-xs text-white"></i></div>
                <h2 class="text-lg font-black tracking-tighter uppercase">ADMIN</h2>
            </div>
            <button onclick="handleLogout()" class="w-9 h-9 bg-slate-800 rounded-xl flex items-center justify-center text-red-500 border border-slate-700 shadow-lg"><i class="fas fa-power-off"></i></button>
        </header>

        <main class="p-4 space-y-6 pb-24">
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="showSection('users')" class="shrink-0 px-6 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-indigo-600 text-white shadow-lg m-btn" data-m-section="users">Users</button>
                <button onclick="showSection('approvals')" class="shrink-0 px-6 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-slate-900 text-slate-500 border border-slate-800 m-btn" data-m-section="approvals">Approvals</button>
                <button onclick="showSection('plans')" class="shrink-0 px-6 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-slate-900 text-slate-500 border border-slate-800 m-btn" data-m-section="plans">Plans</button>
            </div>

            <div id="m-section-users" class="space-y-4 m-content">
                <div class="grid grid-cols-2 gap-4">
                    <div class="stat-card p-5 bg-indigo-950/20 border border-indigo-500/20">
                        <p class="text-[8px] font-black text-indigo-400 uppercase tracking-widest mb-1">Users</p>
                        <h3 id="m-stat-users" class="text-xl font-black tabular-data">--</h3>
                    </div>
                    <div class="stat-card p-5 bg-slate-900 border border-white/5">
                        <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Uplinks</p>
                        <h3 id="m-stat-brokers" class="text-xl font-black tabular-data">--</h3>
                    </div>
                </div>
                <div id="m-user-list" class="space-y-4"></div>
            </div>

            <div id="m-section-approvals" class="space-y-4 m-content hidden">
                <div id="m-approval-list" class="space-y-4"></div>
            </div>
        </main>

        <nav class="mobile-nav">
            <button onclick="location.href='dashboard.html'" class="nav-item-m"><i class="fas fa-home text-lg"></i><span>TRADER</span></button>
            <button onclick="location.reload()" class="nav-item-m active"><i class="fas fa-tools text-lg"></i><span>CONSOLE</span></button>
        </nav>
    </div>

    <script type="module">
        /**
         * Admin Console Logic - Insight Engine
         * Author: Vishal Joshi (vishaljoshi9694@gmail.com)
         */
        import { checkAuth, logout, getAuthHeaders } from './js/auth.js';
        
        const user = checkAuth();
        if (user.role !== 'Admin') window.location.href = 'dashboard.html';

        ['admin-name-d'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.textContent = user.username;
        });

        window.handleLogout = () => { if(confirm('Terminate Session?')) { logout(); window.location.href = 'login.html'; } };

        window.showSection = (sectionId) => {
            // Desktop
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            const dSec = document.getElementById(`section-${sectionId}`);
            if(dSec) dSec.classList.remove('hidden');
            
            document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('btn-active-admin', 'text-white'));
            const activeBtn = document.querySelector(`[data-section="${sectionId}"]`);
            if(activeBtn) {
                activeBtn.classList.add('btn-active-admin', 'text-white');
                document.getElementById('section-title').textContent = activeBtn.textContent.trim();
            }

            // Mobile
            document.querySelectorAll('.m-content').forEach(s => s.classList.add('hidden'));
            const mSec = document.getElementById(`m-section-${sectionId}`);
            if(mSec) mSec.classList.remove('hidden');

            document.querySelectorAll('.m-btn').forEach(b => b.className = "shrink-0 px-6 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-slate-900 text-slate-500 border border-slate-800 m-btn");
            const activeMBtn = document.querySelector(`[data-m-section="${sectionId}"]`);
            if(activeMBtn) activeMBtn.className = "shrink-0 px-6 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-indigo-600 text-white shadow-lg m-btn";

            loadSectionData(sectionId);
        };

        async function loadSectionData(section) {
            try {
                if (section === 'users') {
                    const res = await fetch('/api/admin-dashboard/users', { headers: getAuthHeaders() });
                    const users = await res.json();
                    renderUsers(users);

                    const statsRes = await fetch('/api/admin-dashboard/stats', { headers: getAuthHeaders() });
                    const stats = await statsRes.json();
                    document.getElementById('stat-users').textContent = document.getElementById('m-stat-users').textContent = stats.total_users;
                    document.getElementById('stat-subs').textContent = stats.active_subscriptions;
                    document.getElementById('stat-brokers').textContent = document.getElementById('m-stat-brokers').textContent = stats.active_brokers;
                } else if (section === 'approvals') {
                    const res = await fetch('/api/admin-dashboard/pending-updates', { headers: getAuthHeaders() });
                    const approvals = await res.json();
                    renderApprovals(approvals);
                }
            } catch(e) { console.error("Admin Load Error:", e); }
        }

        window.handleApproval = async (userId, approve) => {
            try {
                const res = await fetch(`/api/admin-dashboard/users/${userId}/approve-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ approve })
                });
                if(res.ok) { alert(approve ? 'PROTOCOL APPROVED' : 'PROTOCOL REJECTED'); loadSectionData('approvals'); }
            } catch(e) { alert('Error: ' + e.message); }
        };

        function renderUsers(users) {
            // Desktop
            document.getElementById('user-table-body').innerHTML = users.map(u => `
                <tr class="hover:bg-indigo-500/5 transition-colors">
                    <td class="px-10 py-6">
                        <p class="font-black text-white text-sm">${u.username}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest">${u.email}</p>
                    </td>
                    <td class="px-6 py-6 text-center">
                        <span class="px-4 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest ${u.subscription ? 'bg-indigo-500/10 text-indigo-400 border border-indigo-500/20' : 'bg-slate-800 text-slate-500'}">
                            ${u.subscription?.plan || 'Standard'}
                        </span>
                    </td>
                    <td class="px-6 py-6 text-center font-mono font-black text-indigo-400 tabular-data">${u.brokers_count}</td>
                    <td class="px-6 py-6"><div class="flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full ${u.is_active ? 'bg-green-500 shadow-green-900/50' : 'bg-red-500'} shadow-lg"></div><span class="text-[10px] font-black uppercase tracking-widest">${u.is_active ? 'Authorized' : 'Restricted'}</span></div></td>
                    <td class="px-10 py-6 text-right"><button class="text-indigo-400 hover:text-white font-black text-[9px] uppercase tracking-[0.2em] mr-6">Override</button><button class="text-red-500 hover:text-white font-black text-[9px] uppercase tracking-[0.2em]">Purge</button></td>
                </tr>`).join('');

            // Mobile
            document.getElementById('m-user-list').innerHTML = users.map(u => `
                <div class="stat-card p-5 border border-white/5 shadow-2xl active:scale-95 transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <div><p class="font-black text-white">${u.username}</p><p class="text-[8px] text-slate-500 uppercase">${u.email}</p></div>
                        <span class="px-3 py-1 rounded-lg text-[7px] font-black bg-indigo-500/10 text-indigo-400">${u.subscription?.plan || 'Standard'}</span>
                    </div>
                    <div class="flex justify-between items-center"><div class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full ${u.is_active ? 'bg-green-500' : 'bg-red-500'}"></div><p class="text-[8px] font-black uppercase text-slate-400">${u.is_active ? 'Active' : 'Banned'}</p></div><button class="text-[8px] font-black uppercase text-indigo-400">Manage</button></div>
                </div>`).join('');
        }

        function renderApprovals(approvals) {
            const empty = '<tr><td colspan="3" class="px-10 py-20 text-center text-slate-500 uppercase font-black text-[10px] tracking-widest">Clearance: No pending actions</td></tr>';
            const tbody = document.getElementById('approvals-table-body');
            const mlist = document.getElementById('m-approval-list');
            
            if (!approvals.length) { tbody.innerHTML = empty; mlist.innerHTML = empty; return; }

            tbody.innerHTML = approvals.map(u => `
                <tr class="hover:bg-indigo-500/5 transition-colors">
                    <td class="px-10 py-8"><p class="font-black text-white uppercase tracking-tight">${u.username}</p><p class="text-[8px] text-slate-500 uppercase font-black tracking-widest">${u.email}</p></td>
                    <td class="px-6 py-8"><pre class="bg-slate-950 p-4 rounded-3xl text-[10px] border border-white/5 text-indigo-400 font-mono">${JSON.stringify(u.pending_updates, null, 2)}</pre></td>
                    <td class="px-10 py-8 text-right"><button onclick="handleApproval(${u.id}, true)" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-xl mr-3">Grant</button><button onclick="handleApproval(${u.id}, false)" class="bg-red-600 hover:bg-red-500 text-white px-6 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-xl">Deny</button></td>
                </tr>`).join('');

            mlist.innerHTML = approvals.map(u => `
                <div class="stat-card p-6 border border-yellow-500/20 shadow-2xl">
                    <p class="font-black text-white uppercase mb-2">${u.username}</p>
                    <pre class="bg-slate-950 p-4 rounded-2xl text-[9px] mb-6 overflow-x-auto text-indigo-400 border border-white/5">${JSON.stringify(u.pending_updates, null, 2)}</pre>
                    <div class="grid grid-cols-2 gap-3"><button onclick="handleApproval(${u.id}, true)" class="bg-green-600 py-3 rounded-xl font-black text-[9px] uppercase">Approve</button><button onclick="handleApproval(${u.id}, false)" class="bg-red-600 py-3 rounded-xl font-black text-[9px] uppercase">Reject</button></div>
                </div>`).join('');
        }

        showSection('users');
    </script>
</body>
</html>
