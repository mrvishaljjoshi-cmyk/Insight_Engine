# Nginx Config for Insight - Optimized for Cloudflare
server {
    listen 80;
    listen 443 ssl http2;
    server_name insight.vjprojects.co.in;

    # SSL Certificates (Cloudflare handles public SSL, but origin needs these if CF talks over 443)
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Serve Native Frontend directly from project folder
    location / {
        root /home/VJPROJECTS/Insight_Engine/frontend_native;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Basic caching for speed
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increased timeouts for AI processing
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check bypass
    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        access_log off;
    }
}
