<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATE_ACCOUNT | INSIGHT.V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile_unified.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="card-v3 neon-glow-green w-full max-w-[440px]">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-slate-900 border border-[#00ff9d] rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl">
                <i class="fas fa-user-plus text-[#00ff9d] text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Create Account</h1>
            <p class="text-[9px] font-black text-slate-500 tracking-[0.3em] uppercase mt-2">Initialize New Demat Node</p>
        </div>

        <form id="register-form" class="space-y-6">
            <div class="space-y-2"><label class="indian-label">Full Username</label><input type="text" id="username" required class="w-full" placeholder="Pick a name"></div>
            <div class="space-y-2"><label class="indian-label">Email ID Address</label><input type="email" id="email" required class="w-full" placeholder="your@email.com"></div>
            <div class="space-y-2"><label class="indian-label">Mobile Number</label><input type="tel" id="mobile" required class="w-full" placeholder="10 digit mobile"></div>
            <div class="space-y-2"><label class="indian-label">Set Secure Password</label><input type="password" id="password" required class="w-full" placeholder="••••••••"></div>
            <button type="submit" class="btn-3d-blue w-full py-6 mt-6">Initialize Identity</button>
        </form>

        <div class="mt-10 text-center border-t border-slate-800 pt-8">
            <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest">Already Have a Node?</p>
            <button onclick="location.href='login.html'" class="mt-4 text-[#00ff9d] hover:text-white text-[11px] font-black uppercase tracking-widest transition-all">Restore Secure Uplink</button>
        </div>
    </div>
    <script type="module">
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault(); const btn = e.target.querySelector('button'); btn.innerText = 'Processing...';
            const p = { username: document.getElementById('username').value, email: document.getElementById('email').value, mobile_no: document.getElementById('mobile').value, password: document.getElementById('password').value };
            try {
                const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) });
                if (res.ok) { alert('Account Created Successfully'); window.location.href = 'login.html'; }
                else { const d = await res.json(); alert(d.detail); }
            } catch (err) { alert('Server Offline'); } finally { btn.innerText = 'Initialize Identity'; }
        };
    </script>
</body>
</html>
